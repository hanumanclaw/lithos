worktree_root: ../worktrees

ralph:
  sandbox_dir: /home/dns/ai-ml/agents/ralph-dev/ralph-sandbox
  session_runner: scripts/ralph-single-step.sh
  max_iterations: 30

orchestrated:
  run_tests_between_steps: true
  max_iteration_retries: 1
  test_commands:
    - make check

prd_review:
  max_cycles: 10

prd_json_review:
  max_cycles: 10

post_review:
  max_cycles: 6

hooks:
  post_worktree_create:
    - "uv sync --extra otel"
