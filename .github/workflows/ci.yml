name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Ruff linter
        run: uv run ruff check src/ tests/

      - name: Run Ruff formatter check
        run: uv run ruff format --check src/ tests/

      - name: Run Pyright type check
        run: uv run pyright src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest tests/ -m "not integration" --cov=lithos --cov-report=xml -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: lithos:test-ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Lithos
        run: |
          cd docker
          LITHOS_IMAGE=lithos:test-ci LITHOS_OTEL_ENABLED=false docker compose up -d --no-build

      - name: Wait for server to become healthy
        run: |
          echo "Waiting for lithos container to become healthy..."
          elapsed=0
          while [ $elapsed -lt 120 ]; do
            status=$(docker inspect --format='{{.State.Health.Status}}' lithos 2>/dev/null || echo "not_found")
            echo "  [$elapsed s] health=$status"
            if [ "$status" = "healthy" ]; then
              echo "Server is healthy after ${elapsed}s"
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          if [ "$status" != "healthy" ]; then
            echo "ERROR: Server did not become healthy within 120s"
            docker compose -f docker/docker-compose.yml logs
            exit 1
          fi

      - name: Show server logs
        run: docker compose -f docker/docker-compose.yml logs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv and test client
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install integration test dependencies
        run: |
          uv sync --extra dev
          uv pip install mcp

      - name: Run integration pytest suite
        env:
          LITHOS_MCP_URL: http://localhost:8765/sse
        run: |
          uv run pytest \
            -m integration \
            tests/test_integration_mcp_sse.py \
            tests/test_integration_conformance.py \
            tests/test_cli_contract.py \
            -v --tb=short

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
